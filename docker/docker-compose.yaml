# tracewarden local demo stack — fully local, zero paid dependencies.
#
#   OTel Collector  :4318 (OTLP/HTTP in)  ->  Tempo (traces)  ->  Grafana
#                                          ->  Phoenix (OpenInference viewer)
#
# Run:  docker compose -f docker/docker-compose.yaml up -d
# Then: uv run python examples/seeded_run.py
# Grafana http://localhost:3000 (anonymous, admin)  ·  Phoenix http://localhost:6006
name: tracewarden-demo

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
      - phoenix

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"   # Tempo query API

  phoenix:
    image: arizephoenix/phoenix:version-6.1.0
    ports:
      - "6006:6006"   # Phoenix UI + OTLP collector
    environment:
      - PHOENIX_WORKING_DIR=/data
    volumes:
      - phoenix-data:/data

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - tempo

volumes:
  phoenix-data:
