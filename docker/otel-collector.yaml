# Fans incoming OTLP spans out to Tempo (Grafana) and Phoenix.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s

exporters:
  # Grafana Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Arize Phoenix (OTLP/HTTP on its own port)
  otlphttp/phoenix:
    endpoint: http://phoenix:6006
    tls:
      insecure: true
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, otlphttp/phoenix, debug]
