name: Publish

# Publishes to PyPI on a GitHub Release, via PyPI Trusted Publishing (OIDC) —
# no long-lived token. One-time maintainer setup (free):
#   1. Register this repo + workflow as a Trusted Publisher for `tracewarden`
#      at https://pypi.org/manage/account/publishing/
#   2. Set repo variable PYPI_PUBLISH_ENABLED=true
# Until both are done the publish job skips (build still runs + validates), so
# releases stay green.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Skips cleanly until the maintainer both (1) registers this repo+workflow as
    # a Trusted Publisher for `tracewarden` on PyPI and (2) sets the repo variable
    # PYPI_PUBLISH_ENABLED=true. This keeps releases green before that one-time setup.
    if: github.event_name == 'release' && vars.PYPI_PUBLISH_ENABLED == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/tracewarden
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
